name: Publish Userscripts to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate userscript metadata
        run: |
          failed=0
          for f in scripts/*.user.js; do
            echo "Checking $f ..."
            for field in @name @version @match; do
              if ! grep -q "$field" "$f"; then
                echo "  MISSING: $field in $f"
                failed=1
              fi
            done
          done
          exit $failed

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy scripts to dist
        run: |
          mkdir -p dist
          cp scripts/*.user.js dist/

      - name: Generate index.html
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head><meta charset="UTF-8"><title>Userscripts</title></head>
          <body>
          <h1>Userscripts</h1>
          <ul>
          EOF
          for f in dist/*.user.js; do
            name=$(basename "$f")
            echo "<li><a href=\"$name\">$name</a></li>" >> dist/index.html
          done
          echo "</ul></body></html>" >> dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
