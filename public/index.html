<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greasyfork Scripts</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .script { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 6px; }
    .script-name { font-weight: bold; font-size: 1.1em; margin-bottom: 4px; }
    .script-meta { font-size: 0.8em; color: #999; margin-bottom: 6px; }
    .script-desc { color: #666; font-size: 0.9em; margin-bottom: 10px; line-height: 1.4; }
    .btn-group { display: flex; gap: 10px; }
    .btn { display: inline-block; padding: 6px 14px; background: #1677ff; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9em; }
    .btn:hover { background: #4096ff; }
    .btn-secondary { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>油猴脚本</h1>
  <div id="scripts-container" style="color:#999;">加载中...</div>

  <script>
    const SCRIPT_FILES = [
      'goto_xueqiu.user.js',
      'eastmoney_highlight_name.user.js',
      'fund_link.user.js',
      'cls_to_eastmoney.user.js',
      'gying_redirect.user.js',
      'block_adblock_pages.user.js',
      'hupu_hide_cba.user.js',
      'xueqiu_to_eps.user.js',
      'eastmoney_update_cookie.user.js'
    ];

    function parseUserScriptMeta(content) {
      const meta = {};
      const lines = content.split('\n');
      let inMeta = false;

      for (const line of lines) {
        if (line.includes('==UserScript==')) {
          inMeta = true;
          continue;
        }
        if (line.includes('==/UserScript==')) {
          break;
        }
        if (inMeta) {
          const match = line.match(/\/\/ @(\w+)\s+(.+)/);
          if (match) {
            const [, key, value] = match;
            meta[key] = value;
          }
        }
      }
      return meta;
    }

    async function fetchScripts() {
      const container = document.getElementById('scripts-container');
      container.innerHTML = '';

      for (const filename of SCRIPT_FILES) {
        try {
          const response = await fetch(filename + '?t=' + Date.now());
          const content = await response.text();
          const meta = parseUserScriptMeta(content);

          const scriptEl = document.createElement('div');
          scriptEl.className = 'script';

          const name = meta['name'] || meta['name:zh-CN'] || filename;
          const desc = meta['description:zh-CN'] || meta['description'] || '';
          const version = meta['version'] || '-';
          const license = meta['license'] || '-';

          scriptEl.innerHTML = `
            <div class="script-name">${name}</div>
            <div class="script-meta">版本 ${version} · ${license}</div>
            <div class="script-desc">${desc}</div>
            <div class="btn-group">
              <a href="${filename}" class="btn">安装脚本</a>
              <a href="${filename}" class="btn btn-secondary">查看源码</a>
            </div>
          `;

          container.appendChild(scriptEl);
        } catch (err) {
          console.error(`Failed to load ${filename}:`, err);
        }
      }
    }

    fetchScripts();
  </script>
</body>
</html>
